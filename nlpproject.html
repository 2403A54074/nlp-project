<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌐 YouTube Comments Analyzer</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b5876);
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

input, select, button {
    padding: 10px;
    margin: 8px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    background: #00c6ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00aaff;
}

.comments {
    margin-top: 20px;
}

.card {
    background: white;
    color: black;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

.meta {
    font-size: 12px;
    color: gray;
    margin-top: 5px;
}

.translated {
    margin-top: 10px;
    font-weight: bold;
    color: #0077cc;
}

.loader {
    text-align: center;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🌐 YouTube Comments Analyzer & Translator</h1>

<div class="container">

<input type="text" id="url" placeholder="Enter YouTube URL" size="40">

<select id="type">
    <option value="time">⬇ Latest</option>
    <option value="relevance">⬆ Popular</option>
</select>

<select id="lang">
    <option value="en">English</option>
    <option value="hi">हिंदी</option>
    <option value="te">తెలుగు</option>
    <option value="ta">தமிழ்</option>
    <option value="kn">ಕನ್ನಡ</option>
</select>

<input type="number" id="limit" value="20" min="5" max="200">

<button onclick="runApp()">Analyze</button>

</div>

<div id="output" class="comments"></div>

<script>

const API_KEY = "YOUR_API_KEY_HERE";

// Extract Video ID
function getVideoId(url) {
    let match = url.match(/(?:v=|youtu\.be\/)([0-9A-Za-z_-]{11})/);
    return match ? match[1] : null;
}

// Fetch comments
async function fetchComments(videoId, order, limit) {
    let comments = [];
    let token = "";

    while (comments.length < limit) {
        let url = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=100&order=${order}&key=${API_KEY}&pageToken=${token}`;
        let res = await fetch(url);
        let data = await res.json();

        data.items.forEach(item => {
            let s = item.snippet.topLevelComment.snippet;

            comments.push({
                text: s.textDisplay,
                likes: s.likeCount,
                replies: item.snippet.totalReplyCount
            });
        });

        token = data.nextPageToken;
        if (!token) break;
    }

    return comments.slice(0, limit);
}

// Translate
async function translate(text, lang) {
    try {
        let url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`;
        let res = await fetch(url);
        let data = await res.json();
        return data[0][0][0];
    } catch {
        return "Error";
    }
}

// Render UI
async function runApp() {

    let output = document.getElementById("output");
    output.innerHTML = "<div class='loader'>⏳ Loading...</div>";

    let videoId = getVideoId(document.getElementById("url").value);
    let order = document.getElementById("type").value;
    let lang = document.getElementById("lang").value;
    let limit = document.getElementById("limit").value;

    if (!videoId) {
        output.innerHTML = "❌ Invalid URL";
        return;
    }

    let comments = await fetchComments(videoId, order, limit);

    output.innerHTML = "";

    for (let c of comments) {

        let translated = await translate(c.text, lang);

        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div>${c.text}</div>
            <div class="translated">${translated}</div>
            <div class="meta">👍 ${c.likes} | 💬 ${c.replies}</div>
        `;

        output.appendChild(card);
    }
}

</script>

</body>
</html>
